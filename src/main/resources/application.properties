# Fabric Open Mirroring sink configuration
debezium.sink.type=fabric

# ── LOCAL TEST MODE ──────────────────────────────────────────────────────────
# Landing zone: local filesystem inside the container (no Azure credentials needed)
# Parquet files will be written to /debezium/data/landing/ inside the container
fabric.landing.baseUri=/debezium/data/landing

# Flush settings (small values so files appear quickly during testing)
fabric.flush.maxBytes=10485760
fabric.flush.maxRecords=1000
fabric.flush.intervalMs=5000

# Parquet settings
fabric.parquet.compression=SNAPPY
fabric.rowMarker.column=__rowMarker__

# Sequence state file
fabric.sequence.stateFileName=_sequence.txt

# Oracle JDBC — omitted; schema will be inferred from CDC event payload
# fabric.oracle.jdbcUrl=jdbc:oracle:thin:@//hostname:1521/SERVICENAME
# fabric.oracle.username=debezium_user
# fabric.oracle.password=${ORACLE_PASSWORD}
fabric.oracle.metadata.refreshIntervalMs=300000
fabric.oracle.fetchRowOnUpdate=false

# ── Debezium source: PostgreSQL (no Oracle licence required) ─────────────────
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=postgres
debezium.source.database.password=postgres
debezium.source.database.dbname=postgres
debezium.source.topic.prefix=test
debezium.source.schema.include.list=public
debezium.source.plugin.name=pgoutput
debezium.source.time.precision.mode=connect
debezium.source.decimal.handling.mode=double

# Offset storage (file-based, persisted in the mounted data volume)
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=1000
