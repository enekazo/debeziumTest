version: "3.8"

services:
  # ── Debezium Server ─────────────────────────────────────────────────────────
  debezium-server:
    build: .
    container_name: debezium-fabric-sink
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      # Entra ID service-principal secret for OneLake access
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      # Remote debug — JVM listens on port 5005; VS Code attaches to localhost:5005
      # Remove or set to empty to disable debugging in production
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    volumes:
      # Single config file — all Oracle source and OneLake sink settings
      - ./src/main/resources/application.properties:/debezium/config/application.properties:ro
      # Persistent offset storage so CDC position survives restarts
      - debezium-offsets:/debezium/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  debezium-offsets:
    driver: local
